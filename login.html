<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GameHub Online Store</title>
    <!-- No navbar.css needed here — login page has no navbar -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="auth-logo">
        <div class="logo-box">Ghos</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your GameHub Online Store account</p>
    </div>

    <div class="auth-card">

        <label>Email</label>
        <input type="email" placeholder="your.email@example.com">

        <label>Password</label>
        <input type="password" placeholder="••••••••">

        <a href="index.html"><button class="auth-btn">Login</button></a>

        <div class="auth-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>

        <div class="demo-box">
            <strong>Demo Credentials</strong>
            <p>
                Admin: <code>admin@gamestore.com</code> / <code>admin123</code><br>
                User: Register a new account
            </p>
        </div>

    </div>

    <a href="index.html" class="back-link">← Back to Store</a>

</body>
</html>
