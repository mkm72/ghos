<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — GameHub Online Store</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="auth-logo">
        <div class="logo-box">Ghos</div>
        <h1>Create Account</h1>
        <p>Join GameHub Online Store today</p>
    </div>

    <div class="auth-card">

        <label>Email</label>
        <input type="email" placeholder="your.email@example.com">

        <label>Password</label>
        <input type="password" placeholder="••••••••">

        <label>Repeat Password</label>
        <input type="password" placeholder="••••••••">

        <a href="index.html"><button class="auth-btn">Register</button></a>

        <div class="auth-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>

    </div>

    <a href="index.html" class="back-link">← Back to Store</a>

</body>
</html>
